server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router — renvoie index.html pour toutes les routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets hashés par Vite
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache sur index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
