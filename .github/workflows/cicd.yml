name: CI/CD Portfolio Front

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_API_VERSION: ${{ secrets.VITE_API_VERSION }}
          VITE_WEATHER_API_KEY: ${{ secrets.VITE_WEATHER_API_KEY }}

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: 'http://localhost:5173'
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_API_VERSION: ${{ secrets.VITE_API_VERSION }}
          VITE_WEATHER_API_KEY: ${{ secrets.VITE_WEATHER_API_KEY }}

      # Deploy uniquement sur push vers main (pas sur les PRs)
      - name: Set lowercase owner
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/portfolio-frontend:latest
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
            VITE_API_VERSION=${{ secrets.VITE_API_VERSION }}
            VITE_WEATHER_API_KEY=${{ secrets.VITE_WEATHER_API_KEY }}

      - name: Deploy on VPS via SSH
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ env.OWNER }}/portfolio-frontend:latest
            docker stop portfolio-frontend || true
            docker rm portfolio-frontend || true
            docker run -d --name portfolio-frontend \
              --restart unless-stopped \
              -p 8080:80 \
              ghcr.io/${{ env.OWNER }}/portfolio-frontend:latest
